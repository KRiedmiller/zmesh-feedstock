{% set version = "1.13.0" %}

package:
  name: zmesh
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/z/zmesh/zmesh-{{ version }}.tar.gz
  sha256: 0bc0d8958ffb6edb2dfa3e597cac260a7cb64b0fb694c862ab139c635754b1ae

build:
  skip: true  # [py<39]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - pbr                               # [build_platform != target_platform]
  host:
    - python
    - setuptools
    - wheel
    - numpy
    - cython
    - pbr
    - pip
  run:
    - python
    - {{ pin_compatible('numpy') }}

test:
  imports:
    - zmesh
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/seung-lab/zmesh/
  summary: Multilabel marching cubes and simplification of volumetric data.
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - KRiedmiller
    - mdraw
